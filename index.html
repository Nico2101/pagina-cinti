<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cintia Agostino | Inicio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=7">
</head>

<body class="bg-aesthetic text-purple-950 flex flex-col min-h-screen overflow-x-hidden">

    <header id="main-header" class="w-full relative z-50"></header>

    <!-- HERO SECTION CON BANNER DECORATIVO -->
    <section class="relative min-h-screen flex items-center justify-center overflow-hidden pt-40 md:pt-24">
        <!-- Banner de fondo decorativo -->
        <div class="absolute top-[20%] left-0 w-full h-[60%] bg-[#2ebfac]/5 skew-y-[-2deg] -z-10"></div>
        <div class="absolute top-[10%] -right-20 w-80 h-80 bg-purple-100 rounded-full blur-3xl opacity-30 -z-10 animate-pulse"></div>
        
        <div class="max-w-7xl mx-auto px-8 md:px-20 w-full flex flex-col md:flex-row items-center gap-12 md:gap-20">
            <!-- Text Content -->
            <div class="w-full md:w-3/5 space-y-8 text-center md:text-left order-2 md:order-1 relative z-10">
                <div class="inline-flex items-center gap-3 bg-white px-4 py-2 rounded-full shadow-sm border border-purple-100">
                   <span class="w-2 h-2 bg-brand-aqua rounded-full animate-ping"></span>
                   <span class="text-[10px] md:text-xs font-bold uppercase tracking-widest text-purple-950/60">Diseño de Futuros Posibles</span>
                </div>
                
                <h1 class="text-5xl md:text-8xl text-purple-950 leading-[1.1] font-serif">Diseñá la vida<br>
                    <span class="text-brand-aqua">que querés habitar.</span></h1>
                
                <p class="text-lg md:text-2xl text-purple-900/70 font-light max-w-xl mx-auto md:mx-0 leading-relaxed">
                    Explorá un proceso de transformación profunda <br class="hidden lg:block"> y encontrá la coherencia entre lo que sentís, pensás y hacés.
                </p>
                
                <div class="flex flex-col sm:flex-row gap-6 pt-6 justify-center md:justify-start">
                    <a href="#cursos"
                        class="btn-accent px-12 py-5 rounded-sm uppercase text-xs font-bold tracking-widest text-center shadow-2xl hover:scale-105 transition-all">Explorar Capacitaciones</a>
                    <a href="#sesiones"
                        class="bg-white/50 backdrop-blur-sm border-2 border-purple-100 px-12 py-5 rounded-sm uppercase text-xs font-bold tracking-widest hover:border-brand-aqua hover:bg-white transition-all text-center">Sesiones 1:1</a>
                </div>
            </div>

            <!-- Image Composition -->
            <div class="w-full md:w-2/5 flex justify-center md:justify-end order-1 md:order-2 relative">
                <div class="relative w-full max-w-[300px] md:max-w-[380px] group">
                    <!-- Marcos Decorativos -->
                    <div class="absolute -inset-4 border-2 border-brand-aqua/20 rounded-tl-[100px] rounded-br-[100px] -z-10 rotate-6 group-hover:rotate-0 transition-transform duration-700"></div>
                    <div class="absolute inset-4 bg-white shadow-2xl rounded-tl-[100px] rounded-br-[100px] -z-10 -rotate-3 group-hover:rotate-0 transition-transform duration-500"></div>
                    
                    <img src="img/cintia%20agostino%20img.jpg" alt="Cintia Agostino"
                        class="w-full h-auto aspect-[4/5] object-cover rounded-tl-[100px] rounded-br-[100px] shadow-2xl group-hover:translate-x-2 group-hover:-translate-y-2 transition-transform duration-500 relative z-20">
                    
                    <!-- Floating Badge -->
                    <div class="absolute -bottom-6 -left-6 bg-purple-95
