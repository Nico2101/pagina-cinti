<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Cintia Agostino | Curso</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        .bg-aesthetic { background-color: #f5f0f6; }
        .btn-accent { background-color: #b5e4ca; color: #3b284e; transition: all 0.3s; }
        .btn-accent:hover { background-color: #92cda9; transform: translateY(-2px); }
    </style>
</head>
<body class="bg-aesthetic text-purple-950">

    <nav class="flex justify-between items-center px-8 py-6 max-w-7xl mx-auto">
        <div class="w-32 md:w-48">
            <a href="index.html">
                <img src="1-removebg-preview.png" alt="Cintia Agostino Logo" class="w-full h-auto drop-shadow-md">
            </a>
        </div>
        <div class="hidden md:flex space-x-8 text-sm uppercase tracking-wider font-medium items-center">
            <a href="sobre-mi.html" class="hover:text-purple-600 transition-colors">Sobre mí</a>
            <a href="index.html#cursos" class="hover:text-purple-600 transition-colors">Cursos</a>
            <a href="membresia.html" class="hover:text-purple-600 transition-colors">Membresía</a>
            <a href="index.html#sesiones" class="hover:text-purple-600 transition-colors">Sesiones</a>
            <a href="https://wa.me/tu-numero" class="btn-accent text-purple-950 font-semibold px-5 py-2 rounded-full">Contacto</a>
        </div>
    </nav>
    <div class="w-full h-3 bg-[#b5e4ca]"></div>

    <!-- Course Hero -->
    <section class="bg-white py-16 px-8 border-t border-purple-100 min-h-[calc(100vh-250px)]">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row gap-16 items-center">
            <div class="md:w-1/2 w-full">
                <div class="overflow-hidden rounded-3xl border border-purple-100 shadow-md bg-[#ece1ef] flex justify-center items-center h-96 p-8 relative group">
                    <img id="curso-img" src="" alt="Curso" class="max-w-full max-h-full object-contain group-hover:scale-105 transition duration-700 drop-shadow-lg">
                </div>
            </div>
            <div class="md:w-1/2 w-full space-y-6">
                <span class="text-[#92cda9] font-bold tracking-widest uppercase text-sm">Curso Online Grabado</span>
                <h1 id="curso-titulo" class="text-4xl md:text-5xl text-purple-950 font-serif leading-tight">Cargando...</h1>
                <p id="curso-desc-larga" class="text-lg text-purple-800/80 leading-relaxed"></p>
                
                <div id="curso-detalles" class="py-6 border-y border-purple-100 my-6 space-y-4">
                </div>

                <div class="flex flex-col sm:flex-row items-center gap-6">
                    <div id="curso-precio" class="text-3xl font-bold text-purple-950"></div>
                    <a id="curso-link" href="#" target="_blank" rel="noopener noreferrer" class="w-full sm:w-auto text-center bg-purple-900 border border-purple-900 text-white px-10 py-4 rounded-lg uppercase text-sm font-bold hover:bg-[#b5e4ca] hover:border-[#b5e4ca] hover:text-purple-950 transition-colors duration-300 shadow-md">Comprar Curso</a>
                </div>
            </div>
        </div>

        <!-- Course Details -->
        <div class="max-w-4xl mx-auto mt-24 space-y-16">
            <div>
                <h2 class="text-3xl text-purple-950 font-serif mb-6 flex items-center gap-3">
                    <span class="bg-[#b5e4ca] w-8 h-1 rounded-full block"></span> ¿Qué vas a aprender?
                </h2>
                <div class="text-purple-800/80 space-y-4 leading-relaxed text-lg">
                    <ul id="curso-aprendizajes" class="list-none space-y-4 mt-8 bg-[#f5f0f6] p-8 rounded-2xl border border-purple-100">
                    </ul>
                </div>
            </div>
        </div>
    </section>

    <footer class="py-12 border-t border-purple-200 text-center bg-[#f5f0f6]">
        <div class="flex flex-col items-center justify-center mb-6">
            <img src="1-removebg-preview.png" alt="Cintia Agostino Icon" class="w-24 mb-4 opacity-80">
            <p class="text-xs uppercase tracking-widest text-purple-800/60">© 2026 Cintia Agostino - Coaching Ontológico</p>
        </div>
        <div class="flex justify-center space-x-6 mt-6">
            <a href="https://instagram.com/cintiaagostino" class="text-purple-800/60 hover:text-purple-900 transition-colors">Instagram</a>
            <a href="#" class="text-purple-800/60 hover:text-purple-900 transition-colors">LinkedIn</a>
        </div>
    </footer>

    <!-- INJECTION SCRIPT -->
    <script src="js/data.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id') || "gestion-emocional";
            const curso = SITE_DATA.cursos.find(c => c.id === id);

            if (!curso) {
                document.getElementById('curso-titulo').innerText = "Curso no encontrado";
                return;
            }

            document.getElementById('page-title').innerText = `Cintia Agostino | ${curso.titulo}`;
            document.getElementById('curso-img').src = curso.imagen;
            document.getElementById('curso-titulo').innerText = curso.titulo;
            document.getElementById('curso-desc-larga').innerHTML = curso.descripcionLarga;
            document.getElementById('curso-precio').innerText = curso.precio;
            document.getElementById('curso-link').href = curso.linkPago;

            document.getElementById('curso-detalles').innerHTML = curso.detalles.map(d => `
                <div class="flex items-center gap-4">
                    <svg class="w-6 h-6 text-[#92cda9]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    <span class="text-sm font-medium text-purple-900">${d}</span>
                </div>
            `).join('');

            document.getElementById('curso-aprendizajes').innerHTML = curso.aprendizajes.map(a => `
                <li class="flex items-start gap-3">
                    <span class="text-[#92cda9] font-bold text-xl leading-none">•</span>
                    <span>${a}</span>
                </li>
            `).join('');
        });
    </script>
</body>
</html>
