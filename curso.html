<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cintia Agostino | Programa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=8">
</head>

<body class="bg-aesthetic text-purple-950 flex flex-col min-h-screen">

    <header id="main-header" class="w-full relative z-50"></header>

    <main id="curso-detalle" class="flex-grow pt-40 md:pt-32 pb-20 px-8">
        <div class="max-w-4xl mx-auto space-y-12">
            <div id="curso-hero" class="space-y-6 text-center">
                <h1 id="curso-titulo" class="text-4xl md:text-6xl font-serif text-purple-950"></h1>
                <p id="curso-desc-larga" class="text-xl text-purple-900/70 leading-relaxed"></p>
                <div class="flex justify-center flex-wrap gap-4 pt-4">
                    <a id="curso-pago" href="#" target="_blank" class="bg-brand-aqua text-white px-8 py-4 rounded-full font-bold shadow-lg hover:bg-[#25a898] transition">Adquirir Programa</a>
                </div>
            </div>
            
            <div class="grid md:grid-cols-2 gap-10">
                <div class="bg-white/40 p-10 rounded-3xl border border-white space-y-4">
                    <h3 class="text-xl font-bold text-brand-aqua uppercase tracking-widest">Lo que lograrás</h3>
                    <ul id="curso-aprendizajes" class="space-y-3 text-purple-900/70"></ul>
                </div>
                <div class="bg-purple-950 text-white p-10 rounded-3xl space-y-4">
                    <h3 class="text-xl font-bold uppercase tracking-widest">Detalles</h3>
                    <ul id="curso-detalles" class="space-y-3 text-purple-100/70"></ul>
                </div>
            </div>
        </div>
    </main>

    <footer id="main-footer"></footer>

    <script src="js/data.js?v=8"></script>
    <script src="js/components.js?v=8"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const cursoId = urlParams.get('id');
            const curso = SITE_DATA.cursos.find(c => c.id === cursoId);

            if(curso) {
                document.title = `Cintia Agostino | ${curso.titulo}`;
                document.getElementById('curso-titulo').innerText = curso.titulo;
                document.getElementById('curso-desc-larga').innerText = curso.descripcionLarga;
                document.getElementById('curso-pago').href = curso.linkPago;
                
                document.getElementById('curso-aprendizajes').innerHTML = curso.aprendizajes.map(a => `<li>• ${a}</li>`).join('');
                document.getElementById('curso-detalles').innerHTML = curso.detalles.map(d => `<li>• ${d}</li>`).join('');
            }
        });
    </script>
</body>
</html>
