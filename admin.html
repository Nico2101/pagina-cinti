<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cintia Admin | Gestión Centralizada</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>

<body class="bg-[#f8fafc] text-slate-800 min-h-screen flex flex-col md:flex-row overflow-x-hidden">

    <!-- LOGIN SCREEN -->
    <div id="login-screen" class="fixed inset-0 bg-purple-950 flex items-center justify-center z-[100] p-6">
        <div class="bg-white p-10 rounded-3xl shadow-2xl w-full max-w-md text-center">
            <h1 class="text-2xl font-bold mb-6">Acceso Administrativo</h1>
            <input type="password" id="admin-pass" class="w-full p-4 border border-slate-200 rounded-xl mb-4 text-center" placeholder="Ingresá la contraseña">
            <button onclick="checkAuth()" class="w-full bg-purple-950 text-white p-4 rounded-xl font-bold hover:bg-purple-900 transition-all">Ingresar</button>
            <p id="login-error" class="text-red-500 text-sm mt-4 hidden">Contraseña incorrecta</p>
        </div>
    </div>

    <!-- MAIN DASHBOARD (Hidden initially) -->
    <div id="admin-dashboard" class="hidden w-full flex flex-col md:flex-row min-h-screen">
        <!-- SIDEBAR -->
        <aside id="sidebar" class="w-full md:w-64 bg-purple-950 text-white p-8 space-y-8 flex-shrink-0">
            <h2 class="text-xl font-bold border-b border-white/20 pb-4">Panel Control</h2>
            <nav class="space-y-4">
                <button onclick="showSection('cursos')" class="sidebar-link w-full text-left p-3 rounded-lg hover:bg-white/10 transition">Cursos</button>
                <button onclick="showSection('sesiones')" class="sidebar-link w-full text-left p-3 rounded-lg hover:bg-white/10 transition">Sesiones</button>
            </nav>
        </aside>

        <!-- CONTENT -->
        <main id="main-content" class="flex-grow p-8 md:p-12">
            <div class="flex justify-between items-center mb-10">
                <h2 id="section-title" class="text-3xl font-bold text-purple-950">Dashboard</h2>
                <div class="flex gap-4">
                    <button onclick="downloadBackup()" class="bg-slate-100 text-slate-600 px-4 py-2 rounded-lg text-sm font-bold">Respaldo Local</button>
                    <button onclick="saveAll()" class="bg-brand-aqua text-white px-6 py-2 rounded-lg font-bold shadow-lg hover:bg-[#25a898] transition">Guardar Cambios</button>
                </div>
            </div>

            <!-- CURSOS LIST -->
            <div id="cursos-section" class="space-y-6">
                <div class="flex justify-between items-center">
                    <h3 class="text-xl font-bold">Catálogo de Cursos</h3>
                </div>
                <div id="admin-cursos-grid" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            </div>

            <!-- SESIONES EDITOR -->
            <div id="sesiones-section" class="hidden space-y-8">
                <h3 class="text-xl font-bold">Configuración de Sesiones 1:1</h3>
                <div id="edit-sesiones-form" class="bg-white p-8 rounded-2xl shadow-sm border border-slate-100 space-y-6"></div>
            </div>
        </main>
    </div>

    <script src="js/data.js?v=8"></script>
    <script src="js/admin.js?v=8"></script>
    <script>
        function checkAuth() {
            const pass = document.getElementById('admin-pass').value;
            if(pass === 'cintia2024') {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('admin-dashboard').classList.remove('hidden');
                initAdmin();
            } else {
                document.getElementById('login-error').classList.remove('hidden');
            }
        }
        function showSection(name) {
            document.getElementById('cursos-section').classList.add('hidden');
            document.getElementById('sesiones-section').classList.add('hidden');
            document.getElementById(name + '-section').classList.remove('hidden');
            document.getElementById('section-title').innerText = name.charAt(0).toUpperCase() + name.slice(1);
        }
    </script>
</body>
</html>
