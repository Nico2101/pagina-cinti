<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel en la Nube | Cintia Agostino</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800">
    
    <div class="bg-purple-950 text-white py-6 shadow-md sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-2xl font-bold">Panel de Administración</h1>
                <p class="text-purple-300 text-sm">Sincronizado directamente con la Nube</p>
            </div>
            <button id="btn-save" onclick="guardarEnLaNube()" class="bg-[#b5e4ca] text-purple-950 px-6 py-3 rounded-lg font-bold hover:bg-[#92cda9] shadow-sm transition flex items-center gap-2 hidden">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                Guardar y Publicar en la Web
            </button>
        </div>
    </div>

    <div class="max-w-5xl mx-auto px-6 py-12" id="app-container">
        <!-- Pantalla de Login -->
        <div id="login-screen" class="bg-white p-8 rounded-xl shadow-md border border-gray-200 max-w-sm mx-auto text-center mt-10">
            <div class="mb-6">
                <!-- Candado o Icono -->
                <div class="bg-purple-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg class="w-8 h-8 text-purple-900" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                </div>
                <h2 class="text-2xl font-bold text-gray-800">Acceso Admin</h2>
            </div>
            
            <div class="space-y-4 text-left">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Usuario</label>
                    <input type="text" id="admin-user" placeholder="Ej: cintia" class="w-full border border-gray-300 rounded p-3 focus:border-purple-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña de Seguridad</label>
                    <input type="password" id="github-token" placeholder="Tu Clave Maestra de GitHub..." class="w-full border border-gray-300 rounded p-3 focus:border-purple-500 outline-none">
                </div>
                <button onclick="iniciarSesion()" class="w-full bg-purple-900 text-white font-bold py-3 px-4 rounded hover:bg-purple-800 transition mt-6 shadow-sm">Ingresar</button>
            </div>
            
            <p class="text-xs text-gray-500 mt-6"><a href="https://github.com/settings/tokens/new" target="_blank" class="hover:text-purple-600 underline">¿Olvidaste tu Contraseña Maestra? Recuperala acá.</a></p>
        </div>

        <!-- Renderizado dinámico de los cursos -->
        <div id="admin-container" class="hidden"></div>
    </div>

    <!-- Mensaje Flotante de Carga -->
    <div id="loader" class="fixed inset-0 bg-black/50 flex justify-center items-center z-50 hidden">
        <div class="bg-white p-8 rounded-xl shadow-2xl flex flex-col items-center">
            <svg class="animate-spin h-10 w-10 text-purple-900 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
            <p class="font-bold text-purple-950" id="loader-text">Conectando con la nube...</p>
        </div>
    </div>

    <script>
        const REPO_OWNER = "Nico2101";
        const REPO_NAME = "pagina-cinti";
        const FILE_PATH = "js/data.js";
        
        let SITE_DATA = null;
        let fileSha = ""; // Necesario para actualizar archivos en GitHub
        let githubToken = localStorage.getItem("cintia_github_token");

        // Utilidad: Codificación segura de caracteres (para guardar acentos correctamente en Base64)
        function utf8_to_b64(str) { return window.btoa(unescape(encodeURIComponent(str))); }
        function b64_to_utf8(str) { return decodeURIComponent(escape(window.atob(str))); }

        // Iniciar Sesión en el panel
        async function iniciarSesion() {
            const inputUser = document.getElementById("admin-user")?.value.trim().toLowerCase() || "";
            const inputToken = document.getElementById("github-token")?.value.trim() || "";
            
            // Si el usuario guardó su sesión previamente, omitimos validación visual
            const finalToken = inputToken || githubToken;
            
            if(!finalToken) { 
                alert("Por favor ingresá tu Usuario y Contraseña."); 
                return; 
            }
            
            // Requerimos el usuario solo si está iniciando sesión por primera vez a mano
            if(inputToken && inputUser !== "cintia") {
                alert("Usuario no reconocido. Verificá que esté bien escrito.");
                return;
            }
            
            if(inputToken) { githubToken = inputToken; }
            
            document.getElementById("login-screen").classList.add("hidden");
            mostrarCarga("Validando seguridad y conectando...");

            try {
                // 1. Buscar data.js en GitHub
                const response = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`, {
                    headers: { "Authorization": `token ${githubToken}` }
                });

                if(!response.ok) throw new Error("Contraseña denegada o acceso no autorizado.");

                const data = await response.json();
                fileSha = data.sha;

                const scriptContent = b64_to_utf8(data.content);
                const jsonText = scriptContent.replace("const SITE_DATA = ", "").replace(/;\s*$/, "");
                SITE_DATA = JSON.parse(jsonText);

                localStorage.setItem("cintia_github_token", githubToken);
                document.getElementById("btn-save").classList.remove("hidden");
                document.getElementById("admin-container").classList.remove("hidden");
                renderAdmin();
                ocultarCarga();

            } catch (error) {
                ocultarCarga();
                alert("Acceso Incorrecto: " + error.message);
                localStorage.removeItem("cintia_github_token");
                document.getElementById("login-screen").classList.remove("hidden");
            }
        }

        // Si ya hay token guardado, autologuea
        if(githubToken) { iniciarSesion(); }

        // Renderizado del HTML del formulario
        function renderAdmin() {
            const container = document.getElementById('admin-container');
            container.innerHTML = SITE_DATA.cursos.map((curso, index) => `
                <div class="bg-white p-8 rounded-xl shadow-sm border border-gray-200 mb-8 hover:shadow-md transition">
                    <h2 class="text-xl font-bold text-purple-900 mb-6 border-b pb-2">✏️ Curso: ${curso.titulo}</h2>
                    <div class="grid md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-medium mb-1 text-gray-600">Título</label>
                            <input onchange="actualizarDato(${index}, 'titulo', this.value)" type="text" class="w-full border border-gray-300 rounded bg-gray-50 focus:bg-white p-2" value="${curso.titulo}">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1 text-gray-600">Precio en Texto</label>
                            <input onchange="actualizarDato(${index}, 'precio', this.value)" type="text" class="w-full border border-gray-300 rounded bg-gray-50 focus:bg-white p-2" value="${curso.precio}">
                        </div>
                        <div class="md:col-span-2">
                            <label class="block text-sm font-medium mb-1 text-gray-600">Descripción Corta</label>
                            <input onchange="actualizarDato(${index}, 'descripcionCorta', this.value)" type="text" class="w-full border border-gray-300 rounded bg-gray-50 focus:bg-white p-2" value="${curso.descripcionCorta}">
                        </div>
                        <div class="md:col-span-2">
                            <label class="block text-sm font-medium mb-1 text-gray-600">Descripción Larga</label>
                            <textarea onchange="actualizarDato(${index}, 'descripcionLarga', this.value)" class="w-full border border-gray-300 rounded bg-gray-50 focus:bg-white p-2 h-24">${curso.descripcionLarga}</textarea>
                        </div>
                        <div class="md:col-span-2">
                            <label class="block text-sm font-medium mb-1 text-gray-600">Link de Pago (MercadoPago, etc)</label>
                            <input onchange="actualizarDato(${index}, 'linkPago', this.value)" type="text" class="w-full border border-gray-300 rounded bg-green-50 p-2" value="${curso.linkPago}">
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function actualizarDato(index, campo, valor) {
            SITE_DATA.cursos[index][campo] = valor;
        }

        async function guardarEnLaNube() {
            mostrarCarga("Subiendo actualizaciones al servidor central...");
            
            // Re-armamos el texto de JS exacto
            const nuevoContenidoJS = "const SITE_DATA = " + JSON.stringify(SITE_DATA, null, 4) + ";\n";
            const base64Content = utf8_to_b64(nuevoContenidoJS);

            try {
                // Hacemos el "PUSH" mediante la API usando método PUT
                const response = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`, {
                    method: 'PUT',
                    headers: {
                        "Authorization": `token ${githubToken}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        message: "Actualización de cursos desde el Panel Web",
                        content: base64Content,
                        sha: fileSha // Esto previene conflictos asegurando que actualizamos la versión correcta
                    })
                });

                if(!response.ok) throw new Error("No se pudo guardar, revisá que el token tenga permisos.");
                
                const data = await response.json();
                fileSha = data.content.sha; // Guardamos el nuevo rastro

                ocultarCarga();
                alert("🎉 ¡Actualización un éxito!\n\nNetlify ya recibió la orden y los cambios impactarán en tu página principal mundialmente en aproximadamente 15 a 30 segundos.");

            } catch(error) {
                ocultarCarga();
                alert("Hubo un error al intentar publicar: " + error.message);
            }
        }

        function mostrarCarga(txt) {
            document.getElementById("loader-text").innerText = txt;
            document.getElementById("loader").classList.remove("hidden");
        }
        function ocultarCarga() {
            document.getElementById("loader").classList.add("hidden");
        }
    </script>
</body>
</html>
