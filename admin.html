<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cintia Admin | Gestión V2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .tab-active { background-color: #2ebfac; color: white; }
    </style>
</head>

<body class="bg-[#f8fafc] text-slate-800 min-h-screen flex flex-col md:flex-row overflow-x-hidden">

    <!-- LOGIN SCREEN -->
    <div id="login-screen" class="fixed inset-0 bg-purple-950 flex items-center justify-center z-[110] p-6">
        <div class="bg-white p-10 rounded-3xl shadow-2xl w-full max-w-md text-center">
            <h1 class="text-2xl font-bold mb-6 text-purple-950">Acceso Administrativo</h1>
            <p class="text-slate-500 mb-8">Ingresá tu clave para gestionar el sitio.</p>
            <input type="password" id="admin-pass" class="w-full p-4 border border-slate-200 rounded-xl mb-4 text-center text-lg" placeholder="••••••••">
            <button onclick="checkAuth()" class="w-full bg-purple-950 text-white p-4 rounded-xl font-bold hover:bg-purple-900 transition-all shadow-lg active:scale-95">Ingresar al Dashboard</button>
            <p id="login-error" class="text-red-500 text-sm mt-4 hidden">Firma incorrecta. Intentá de nuevo.</p>
        </div>
    </div>

    <!-- MAIN DASHBOARD -->
    <div id="admin-dashboard" class="hidden w-full flex flex-col md:flex-row min-h-screen overflow-hidden">
        
        <!-- SIDEBAR -->
        <aside class="w-full md:w-72 bg-purple-950 text-white flex flex-col p-8 space-y-10 flex-shrink-0">
            <div class="flex items-center gap-3 border-b border-white/10 pb-6">
                <div class="w-10 h-10 bg-brand-aqua rounded-xl flex items-center justify-center font-bold text-xl">CA</div>
                <h2 class="font-bold tracking-tight">Cintia Admin</h2>
            </div>
            
            <nav class="flex-grow space-y-4">
                <button onclick="showTab('dashboard')" class="nav-btn w-full text-left p-4 rounded-xl transition-all flex items-center gap-4 hover:bg-white/10" id="btn-dashboard">
                    <span class="text-xs font-bold uppercase tracking-widest">General</span>
                </button>
                <button onclick="showTab('cursos')" class="nav-btn w-full text-left p-4 rounded-xl transition-all flex items-center gap-4 hover:bg-white/10" id="btn-cursos">
                    <span class="text-xs font-bold uppercase tracking-widest">Cursos Online</span>
                </button>
                <button onclick="showTab('membresia')" class="nav-btn w-full text-left p-4 rounded-xl transition-all flex items-center gap-4 hover:bg-white/10" id="btn-membresia">
                    <span class="text-xs font-bold uppercase tracking-widest">Membresía</span>
                </button>
                <button onclick="showTab('sesiones')" class="nav-btn w-full text-left p-4 rounded-xl transition-all flex items-center gap-4 hover:bg-white/10" id="btn-sesiones">
                    <span class="text-xs font-bold uppercase tracking-widest">Sesiones 1:1</span>
                </button>
            </nav>

            <button onclick="saveAll()" class="w-full bg-brand-aqua text-white p-4 rounded-xl font-bold shadow-xl hover:bg-[#25a898] transition-all transform active:scale-95 flex items-center justify-center gap-2">
                Publicar Cambios
            </button>
        </aside>

        <!-- CONTENT AREA -->
        <main class="flex-grow p-6 md:p-12 overflow-y-auto bg-slate-50">
            <!-- HEADER INFO -->
            <div class="flex justify-between items-center mb-10 border-b border-slate-200 pb-8">
                <div>
                    <h1 id="tab-title" class="text-4xl font-serif text-purple-950 mb-2">Bienvenida</h1>
                    <p class="text-slate-500">¿Qué vamos a actualizar hoy?</p>
                </div>
                <div id="save-status" class="hidden px-6 py-2 bg-green-100 text-green-700 rounded-lg text-sm font-bold animate-fade-in">¡Cambios guardados!</div>
            </div>

            <!-- TAB: DASHBOARD -->
            <section id="tab-dashboard" class="tab-content space-y-8">
                <div class="grid md:grid-cols-3 gap-6">
                    <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-100">
                        <h4 class="text-slate-400 text-xs font-bold uppercase tracking-widest mb-2">Total Cursos</h4>
                        <p class="text-4xl font-serif text-purple-950" id="stats-cursos">0</p>
                    </div>
                </div>
            </section>

            <!-- TAB: CURSOS -->
            <section id="tab-cursos" class="tab-content hidden space-y-6">
                <div id="admin-cursos-list" class="grid lg:grid-cols-2 gap-6"></div>
            </section>

            <!-- TAB: MEMBRESIA -->
            <section id="tab-membresia" class="tab-content hidden space-y-6">
                <div id="admin-membresia-form" class="bg-white p-8 rounded-3xl shadow-sm border border-slate-100"></div>
            </section>

            <!-- TAB: SESIONES -->
            <section id="tab-sesiones" class="tab-content hidden space-y-6">
                <div id="admin-sesiones-form" class="bg-white p-8 rounded-3xl shadow-sm border border-slate-100"></div>
            </section>
        </main>
    </div>

    <script src="js/data.js?v=15"></script>
    <script src="js/admin.js?v=15"></script>
    <script>
        function checkAuth() {
            const pass = document.getElementById('admin-pass').value;
            if (pass === 'cintia2024') {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('admin-dashboard').classList.remove('hidden');
                initAdmin();
                showTab('dashboard');
            } else {
                document.getElementById('login-error').classList.remove('hidden');
            }
        }

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.getElementById('tab-' + id).classList.remove('hidden');
            
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('tab-active'));
            document.getElementById('btn-' + id).classList.add('tab-active');
            
            const titles = {
                dashboard: 'Dashboard General',
                cursos: 'Gestión de Cursos',
                membresia: 'Configuración de Membresía',
                sesiones: 'Ajustes de Sesiones 1:1'
            };
            document.getElementById('tab-title').innerText = titles[id];
        }
    </script>
</body>
</html>
